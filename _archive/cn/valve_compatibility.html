<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Performance — 閥門控制器 車種對應表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --orange: #EA5504;
    --orange-dim: #ea550433;
    --orange-glow: #ea550466;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --card: #141414;
    --border: #222222;
    --text: #f0f0f0;
    --text2: #aaaaaa;
    --text3: #666666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .top-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--orange), #ff7b2e, var(--orange));
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  }

  nav {
    position: fixed; top: 4px; left: 0; right: 0; z-index: 999;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  nav .logo { height: 28px; opacity: 0.9; }
  nav .nav-links { display: flex; gap: 24px; align-items: center; }
  nav .nav-links a {
    color: var(--text2); text-decoration: none; font-size: 13px;
    font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s;
  }
  nav .nav-links a:hover { color: var(--orange); }

  .hero {
    margin-top: 64px; padding: 80px 24px 60px;
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
  }
  .hero-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 40px;
  }
  .hero-text { flex: 1; }
  .hero-stripes {
    display: flex; gap: 4px; margin-bottom: 24px;
  }
  .hero-stripes span {
    width: 40px; height: 4px; background: var(--orange); border-radius: 2px;
    opacity: 0.3;
  }
  .hero-stripes span:first-child { opacity: 1; }
  .hero-stripes span:nth-child(2) { opacity: 0.7; }
  .hero-stripes span:nth-child(3) { opacity: 0.5; }

  h1 {
    font-size: 48px; font-weight: 800; line-height: 1.1;
    letter-spacing: -1px; margin-bottom: 8px;
  }
  h1 .accent { color: var(--orange); }
  .subtitle {
    font-size: 16px; color: var(--text2); font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px;
  }
  .hero-stats { display: flex; gap: 16px; }
  .stat {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 24px; min-width: 120px;
  }
  .stat .num {
    font-size: 36px; font-weight: 800; color: var(--orange);
    line-height: 1;
  }
  .stat .label {
    font-size: 12px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 1px; margin-top: 4px;
  }

  .hero-image {
    flex: 0 0 380px; position: relative;
  }
  .hero-image img {
    width: 100%; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .hero-image .glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px; border-radius: 50%;
    background: var(--orange-glow); filter: blur(80px);
    z-index: -1;
  }

  .toolbar {
    position: sticky; top: 64px; z-index: 998;
    background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px;
    max-width: 100%;
  }
  .search-box {
    flex: 1; max-width: 400px;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--orange); }
  .search-box input {
    background: none; border: none; color: var(--text);
    font-size: 14px; width: 100%; outline: none;
    font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text3); }
  .search-box svg { color: var(--text3); flex-shrink: 0; }

  .filter-btn {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--orange); color: var(--text); }
  .filter-btn.active {
    background: var(--orange); border-color: var(--orange);
    color: white; font-weight: 600;
  }
  .result-count {
    margin-left: auto; font-size: 13px; color: var(--text3); white-space: nowrap;
  }

  .brands-container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .brand-section {
    margin-bottom: 8px; border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    background: var(--card); transition: border-color 0.2s;
  }
  .brand-section:hover { border-color: #333; }

  .brand-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; cursor: pointer; user-select: none;
    transition: background 0.2s;
  }
  .brand-header:hover { background: var(--bg3); }
  .brand-indicator {
    width: 4px; height: 24px; background: var(--orange);
    border-radius: 2px; opacity: 0.5;
    transition: opacity 0.2s;
  }
  .brand-section.open .brand-indicator { opacity: 1; }
  .brand-name {
    font-size: 16px; font-weight: 700; letter-spacing: 1px; flex: 1;
  }
  .brand-count {
    font-size: 12px; color: var(--text3); background: var(--bg3);
    padding: 2px 10px; border-radius: 10px;
  }
  .brand-arrow {
    color: var(--text3); transition: transform 0.3s;
  }
  .brand-section.open .brand-arrow { transform: rotate(180deg); }

  .brand-cars {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .brand-section.open .brand-cars { max-height: 10000px; }
  .brand-cars-inner { padding: 0 20px 16px; }

  .car-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .car-card:hover { border-color: var(--orange-dim); }
  .car-card:last-child { margin-bottom: 0; }

  .car-top {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap; margin-bottom: 8px;
  }
  .car-name { font-weight: 600; font-size: 15px; }
  .car-chassis { color: var(--text2); font-weight: 400; }
  .car-year {
    font-size: 12px; color: var(--text3);
    background: var(--bg3); padding: 1px 8px; border-radius: 4px;
    margin-left: 4px;
  }

  .ctrl-tag {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; letter-spacing: 0.5px;
  }
  .ctrl-tag.xflap { background: #1a3a1a; color: #4ade80; }
  .ctrl-tag.evalve { background: #1a2a3a; color: #60a5fa; }
  .ctrl-tag.default { background: var(--bg3); color: var(--text2); }

  /* ── Compatibility badges ── */
  .compat-row {
    display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0 4px;
  }
  .compat-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 6px; display: inline-flex; align-items: center; gap: 3px;
    letter-spacing: 0.3px;
  }
  .compat-badge.ok { background: #0d2818; color: #4ade80; border: 1px solid #166534; }
  .compat-badge.no { background: #1c1012; color: #666; border: 1px solid #2a2a2a; opacity: 0.45; }
  .compat-badge.pending { background: #1a1500; color: #facc15; border: 1px solid #854d0e; }

  .compat-summary {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .compat-count {
    font-size: 12px; font-weight: 700; padding: 2px 10px;
    border-radius: 10px; background: #0d2818; color: #4ade80;
    border: 1px solid #166534;
  }
  .compat-version {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--bg3); color: var(--orange); border: 1px solid var(--border);
    font-weight: 600; letter-spacing: 0.5px;
  }
  .compat-hp {
    font-size: 14px; font-weight: 800; color: var(--orange);
    letter-spacing: -0.3px;
  }

  .car-details {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
  }
  .detail-row {
    display: flex; gap: 8px; font-size: 13px; padding: 2px 0;
  }
  .detail-label {
    color: var(--text3); min-width: 60px; flex-shrink: 0;
  }
  .detail-value { color: var(--text2); word-break: break-word; }

  footer {
    text-align: center; padding: 40px 24px;
    border-top: 1px solid var(--border);
    color: var(--text3); font-size: 12px;
    display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  }
  footer a { color: var(--orange); text-decoration: none; }

  @media (max-width: 768px) {
    h1 { font-size: 32px; }
    .hero { padding: 60px 16px 40px; }
    .hero-inner { flex-direction: column; }
    .hero-stats { flex-wrap: wrap; gap: 12px; }
    .stat { min-width: 100px; padding: 14px 16px; }
    .stat .num { font-size: 28px; }
    .hero-image { display: none; }
    nav .nav-links { display: none; }
    .car-details { grid-template-columns: 1fr; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand-section { animation: fadeUp 0.3s ease forwards; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--orange); }

  .lang-switch {
    display: flex; align-items: center; gap: 6px; margin-left: 16px;
  }
  .lang-switch a {
    color: var(--text3); text-decoration: none; font-size: 13px;
    font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s;
    padding: 2px 6px; border-radius: 4px;
  }
  .lang-switch a:hover { color: var(--text); }
  .lang-switch .lang-active { color: var(--orange); font-weight: 700; }
  .lang-switch .lang-sep { color: var(--text3); font-size: 12px; }
</style>
</head>

const FIELDS = [{"key": "controller", "label": "控制器"}, {"key": "valve_type", "label": "閥門類型"}, {"key": "valve_count", "label": "閥門數量"}, {"key": "xflap_ver", "label": "X-FLAP"}, {"key": "xflap_machine", "label": "X-FLAP 機種"}, {"key": "evalve2_main", "label": "主機"}, {"key": "evalve2_harness", "label": "線組"}, {"key": "evalve2_shield", "label": "屏蔽"}, {"key": "motor_pn", "label": "料號"}, {"key": "pin", "label": "接頭"}];
const FILTER_FIELD = "controller";
let currentFilter = 'all';
let searchText = '';

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTags(val) {
  if (!val) return '';
  return val.split('|').map(c => {
    c = c.trim();
    let cls = 'default';
    if (c === 'X-FLAP') cls = 'xflap';
    else if (c.includes('VALVE') || c.includes('valve')) cls = 'evalve';
    return `<span class="ctrl-tag ${cls}">${escHtml(c)}</span>`;
  }).join(' ');
}

// Sensor/compat fields that use O/X values
const SENSOR_FIELDS = ['speed','rpm','water_temp','exhaust','intake','turbo','voltage','trans_oil','oil_temp','afr','mileage','fuel','basic_info'];
// Fields that are version/status indicators
const VERSION_FIELDS = ['version'];
const STATUS_FIELDS = ['status','compat'];
const HP_FIELDS = ['hp'];
const SKIP_IN_DETAILS = [...SENSOR_FIELDS, ...VERSION_FIELDS, ...STATUS_FIELDS, ...HP_FIELDS];

function renderCompatBadges(car) {
  // Check if this car has sensor fields (O/X pattern)
  const sensors = FIELDS.filter(f => SENSOR_FIELDS.includes(f.key));
  if (sensors.length === 0) return '';

  const okList = [];
  const noList = [];
  for (const f of sensors) {
    const v = (car[f.key] || '').trim();
    if (v === 'O' || v === '○' || v === '☑️') okList.push(f.label);
    else if (v === 'X' || v === '✗' || v === '×') noList.push(f.label);
  }

  if (okList.length === 0 && noList.length === 0) return '';

  let html = '<div class="compat-summary">';
  html += `<span class="compat-count">✓ ${okList.length} / ${okList.length + noList.length}</span>`;

  // Show version if exists
  const verField = FIELDS.find(f => VERSION_FIELDS.includes(f.key));
  if (verField && car[verField.key]) {
    html += `<span class="compat-version">${escHtml(car[verField.key])}</span>`;
  }
  html += '</div>';

  html += '<div class="compat-row">';
  for (const name of okList) {
    html += `<span class="compat-badge ok">✓ ${escHtml(name)}</span>`;
  }
  for (const name of noList) {
    html += `<span class="compat-badge no">✗ ${escHtml(name)}</span>`;
  }
  html += '</div>';
  return html;
}

function renderStatusLine(car) {
  let parts = [];

  // Status field (☑️ etc)
  const statusField = FIELDS.find(f => STATUS_FIELDS.includes(f.key));
  if (statusField && car[statusField.key]) {
    const sv = car[statusField.key].trim();
    if (sv === '☑️' || sv === 'O' || sv.toLowerCase() === 'ok') {
      parts.push('<span class="compat-badge ok">✓ 已驗證</span>');
    } else if (sv.includes('待')) {
      parts.push(`<span class="compat-badge pending">⏳ ${escHtml(sv)}</span>`);
    } else {
      parts.push(`<span class="compat-badge ok">${escHtml(sv)}</span>`);
    }
  }

  // HP field
  const hpField = FIELDS.find(f => HP_FIELDS.includes(f.key));
  if (hpField && car[hpField.key]) {
    parts.push(`<span class="compat-hp">${escHtml(car[hpField.key])} hp</span>`);
  }

  // Version
  const verField = FIELDS.find(f => VERSION_FIELDS.includes(f.key));
  if (verField && car[verField.key] && !FIELDS.some(f => SENSOR_FIELDS.includes(f.key))) {
    parts.push(`<span class="compat-version">${escHtml(car[verField.key])}</span>`);
  }

  if (parts.length === 0) return '';
  return `<div class="compat-summary">${parts.join(' ')}</div>`;
}

function renderCar(car) {
  const chassis = car.chassis ? ` <span class="car-chassis">(${escHtml(car.chassis)})</span>` : '';
  const year = car.year ? `<span class="car-year">${escHtml(car.year)}</span>` : '';
  const engine = car.engine ? `<span class="car-year">${escHtml(car.engine)}</span>` : '';

  // Tags from filter field
  let tagsHtml = '';
  if (FILTER_FIELD && car[FILTER_FIELD]) {
    tagsHtml = renderTags(car[FILTER_FIELD]);
  }

  // Compat badges (for sensor-based products like D-Meter, FD-EVO)
  const compatHtml = renderCompatBadges(car);
  // Status line (for products with status/hp fields)
  const statusHtml = renderStatusLine(car);

  // Regular detail fields (skip sensor/version/status fields already shown above)
  let details = [];
  for (const f of FIELDS) {
    if (SKIP_IN_DETAILS.includes(f.key) && (compatHtml || statusHtml)) continue;
    if (f.key === FILTER_FIELD) continue;
    const val = car[f.key];
    if (val && val !== 'no need') {
      // Highlight "待確認" values
      if (val.includes('待確認') || val.includes('待')) {
        details.push([f.label, val, 'pending']);
      } else if (val === 'X' || val === '無法對應') {
        details.push([f.label, val, 'no']);
      } else {
        details.push([f.label, val, 'ok']);
      }
    }
  }

  const detailsHtml = details.map(([lbl, val, state]) => {
    let valClass = 'detail-value';
    if (state === 'pending') valClass = 'detail-value" style="color:#facc15';
    else if (state === 'no') valClass = 'detail-value" style="color:#666;text-decoration:line-through';
    return `<div class="detail-row"><span class="detail-label">${lbl}</span><span class="${valClass}">${escHtml(val)}</span></div>`;
  }).join('');

  return `<div class="car-card">
    <div class="car-top">
      <span class="car-name">${escHtml(car.model)}${chassis} ${year} ${engine}</span>
      ${tagsHtml}
    </div>
    ${statusHtml}
    ${compatHtml}
    <div class="car-details">${detailsHtml}</div>
  </div>`;
}

function render() {
  const container = document.getElementById('brandsContainer');
  const q = searchText.toLowerCase();
  let totalVisible = 0;
  let html = '';

  for (const [brand, cars] of Object.entries(DATA)) {
    const filtered = cars.filter(car => {
      if (currentFilter !== 'all' && FILTER_FIELD) {
        const fv = car[FILTER_FIELD] || '';
        if (!fv.includes(currentFilter)) return false;
      }
      if (q) {
        const haystack = [brand, car.model, car.chassis, car.year, car.engine,
          ...FIELDS.map(f => car[f.key] || '')].join(' ').toLowerCase();
        return haystack.includes(q);
      }
      return true;
    });

    if (filtered.length === 0) continue;
    totalVisible += filtered.length;

    const isOpen = q ? 'open' : '';
    html += `<div class="brand-section ${isOpen}">
      <div class="brand-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="brand-indicator"></div>
        <span class="brand-name">${escHtml(brand)}</span>
        <span class="brand-count">${filtered.length} 台</span>
        <svg class="brand-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="brand-cars">
        <div class="brand-cars-inner">
          ${filtered.map(renderCar).join('')}
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = html || '<div style="text-align:center;padding:60px;color:var(--text3)">無符合條件的車種</div>';
  document.getElementById('resultCount').textContent = `${totalVisible} 台車種`;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
